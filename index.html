<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Repos Gallery</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
            :root {
              --bg: #050508;
              --surface: #0a0a14;
              --card: rgba(255, 255, 255, 0.03);
              --card-hover: rgba(255, 255, 255, 0.06);
              --border: rgba(255, 255, 255, 0.08);
              --border-active: rgba(124, 107, 255, 0.3);
              --text-primary: #ffffff;
              --text-secondary: #94a3b8;
              --accent: #7c6bff;
              --accent-glow: rgba(124, 107, 255, 0.2);
              --teal: #00d4aa;
              --pink: #ff6bbf;
              --font-main: "Inter", sans-serif;
              --font-mono: "Space Mono", monospace;
              --glass: blur(10px);
            }

            * {
              box-sizing: border-box;
              margin: 0;
              padding: 0;
            }

            body {
              font-family: var(--font-main);
              background: var(--bg);
              color: var(--text-primary);
              min-height: 100vh;
              overflow-x: hidden;
              display: flex;
              flex-direction: column;
              align-items: center;
              padding-bottom: 50px;
              scroll-behavior: smooth;
            }

            /* Abstract dynamic background */
            body::before {
              content: "";
              position: fixed;
              top: -10%;
              left: -10%;
              width: 120%;
              height: 120%;
              background:
                radial-gradient(
                  circle at 10% 20%,
                  rgba(124, 107, 255, 0.05) 0%,
                  transparent 40%
                ),
                radial-gradient(
                  circle at 90% 80%,
                  rgba(0, 212, 170, 0.05) 0%,
                  transparent 40%
                );
              z-index: -1;
            }

            header {
              width: 100%;
              max-width: 900px;
              padding: 40px 20px;
              text-align: center;
              animation: fadeInDown 0.8s ease-out;
            }

            @keyframes fadeInDown {
              from {
                opacity: 0;
                transform: translateY(-20px);
              }
              to {
                opacity: 1;
                transform: translateY(0);
              }
            }

            .profile-container {
              display: flex;
              flex-direction: column;
              align-items: center;
              gap: 20px;
              margin-bottom: 40px;
            }

            .avatar-glow {
              position: relative;
              width: 120px;
              height: 120px;
              border-radius: 50%;
              background: linear-gradient(45deg, var(--accent), var(--teal));
              padding: 3px;
              box-shadow: 0 0 20px var(--accent-glow);
            }

            .avatar {
              width: 100%;
              height: 100%;
              border-radius: 50%;
              object-fit: cover;
              border: 2px solid var(--bg);
            }

            .profile-info h1 {
              font-family: var(--font-mono);
              font-size: 2.5rem;
              font-weight: 700;
              margin-bottom: 10px;
              letter-spacing: -1px;
              background: linear-gradient(to right, #fff, var(--text-secondary));
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
            }

            .stats-bar {
              display: flex;
              gap: 24px;
              justify-content: center;
              margin-top: 20px;
              flex-wrap: wrap;
            }

            .stat-item {
              display: flex;
              flex-direction: column;
              align-items: center;
              padding: 10px 20px;
              background: var(--card);
              border: 1px solid var(--border);
              border-radius: 12px;
              min-width: 120px;
              backdrop-filter: var(--glass);
            }

            .stat-value {
              font-family: var(--font-mono);
              font-size: 1.2rem;
              font-weight: 700;
              color: var(--accent);
            }

            .stat-label {
              font-size: 0.7rem;
              text-transform: uppercase;
              letter-spacing: 1px;
              color: var(--text-secondary);
              margin-top: 4px;
            }

            .gallery-title {
              font-family: var(--font-mono);
              font-size: 1rem;
              color: var(--text-secondary);
              text-transform: uppercase;
              letter-spacing: 4px;
              margin: 40px 0 20px;
              position: relative;
            }

            .gallery-title::after {
              content: "";
              display: block;
              width: 40px;
              height: 2px;
              background: var(--accent);
              margin: 8px auto;
            }

            /* Search Bar */
            .search-container {
              position: relative;
              max-width: 500px;
              margin: 0 auto 20px auto;
            }
            .search-container input {
              width: 100%;
              padding: 8px 12px 8px 36px;
              background: var(--card);
              border: 1px solid var(--border);
              border-radius: 999px;
              font-family: var(--font-main);
              color: var(--text-primary);
              outline: none;
              box-sizing: border-box;
            }
            .search-container input::placeholder {
              color: var(--text-secondary);
            }
            .search-container::before {
              content: "🔍";
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              font-size: 1rem;
              color: var(--text-secondary);
            }

            /* Filter Tabs */
            .filter-tabs {
              display: flex;
              gap: 8px;
              justify-content: center;
              margin-bottom: 20px;
            }
            .filter-tab {
              padding: 6px 12px;
              background: var(--card);
              border: 1px solid var(--border);
              border-radius: 999px;
              font-family: var(--font-mono);
              color: var(--text-secondary);
              cursor: pointer;
              transition: all 0.3s ease;
            }
            .filter-tab:hover {
              background: var(--card-hover);
              border-color: var(--border-active);
              color: var(--accent);
            }
            .filter-tab.active {
              background: var(--accent-glow);
              border-color: var(--accent);
              color: var(--accent);
            }

            /* Grid */
            .grid {
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
              gap: 20px;
              width: 100%;
              max-width: 1100px;
              padding: 20px;
            }

            .repo-card {
              background: var(--card);
              border: 1px solid var(--border);
              border-radius: 16px;
              padding: 24px;
              text-decoration: none;
              color: inherit;
              display: flex;
              flex-direction: column;
              gap: 16px;
              transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              backdrop-filter: var(--glass);
              position: relative;
              overflow: hidden;
              opacity: 0;
              transform: translateY(20px);
            }

            .repo-card.loaded {
              opacity: 1;
              transform: translateY(0);
            }

            .repo-card:hover {
              background: var(--card-hover);
              border-color: var(--border-active);
              transform: translateY(-5px);
              box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            }

            .repo-card::before {
              content: "";
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background: linear-gradient(135deg, var(--accent-glow), transparent);
              opacity: 0;
              transition: opacity 0.3s;
            }

            .repo-card:hover::before {
              opacity: 1;
            }

            .card-header {
              display: flex;
              justify-content: space-between;
              align-items: flex-start;
              z-index: 1;
            }

            .repo-name {
              font-family: var(--font-mono);
              font-size: 1.1rem;
              color: var(--accent);
              font-weight: 700;
            }

            .star-count {
              display: flex;
              align-items: center;
              gap: 6px;
              font-family: var(--font-mono);
              font-size: 0.85rem;
              color: var(--text-secondary);
            }

            .fork-count {
              display: flex;
              align-items: center;
              gap: 6px;
              font-family: var(--font-mono);
              font-size: 0.85rem;
              color: var(--text-secondary);
            }

            .repo-desc {
              font-size: 0.9rem;
              line-height: 1.6;
              color: var(--text-secondary);
              flex-grow: 1;
              z-index: 1;
              display: -webkit-box;
              -webkit-line-clamp: 3;
              -webkit-box-orient: vertical;
              overflow: hidden;
            }

            .topics {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              z-index: 1;
            }

            .topic {
        padding: 4px 10px;
        background: rgba(0, 212, 170, 0.05);
        border: 1px solid rgba(0, 212, 170, 0.1);
        border-radius: 6px;
        font-size: 0.75rem;
        color: var(--teal);
        font-family: var(--font-mono);
      }

      /* Category badge – same layout as topics */
      .category-badge {
        padding: 4px 10px;
        border: 1px solid;
        border-radius: 6px;
        font-size: 0.75rem;
        color: var(--text-primary);
        font-family: var(--font-mono);
        margin-left: 8px;
      }
              padding: 4px 10px;
              background: rgba(0, 212, 170, 0.05);
              border: 1px solid rgba(0, 212, 170, 0.1);
              border-radius: 6px;
              font-size: 0.75rem;
              color: var(--teal);
              font-family: var(--font-mono);
            }

            .card-footer {
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 10px;
              padding-top: 15px;
              border-top: 1px solid var(--border);
              z-index: 1;
            }

            .language {
              display: flex;
              align-items: center;
              gap: 8px;
              font-size: 0.8rem;
              color: var(--text-secondary);
            }

            .lang-dot {
              width: 10px;
              height: 10px;
              border-radius: 50%;
            }

            /* Issues Window */
            .issues-corner {
              position: fixed;
              bottom: 0;
              right: 30px;
              width: 320px;
              background: var(--surface);
              border: 1px solid var(--border);
              border-radius: 20px 20px 0 0;
              box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
              z-index: 100;
              overflow: hidden;
              display: flex;
              flex-direction: column;
              backdrop-filter: var(--glass);
              transform: translateY(calc(100% - 50px)); /* Only header visible */
              transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
              cursor: pointer;
            }

            .issues-corner.expanded {
              transform: translateY(0);
            }

            .issues-header {
              padding: 15px 20px;
              background: rgba(255, 255, 255, 0.02);
              border-bottom: 1px solid var(--border);
              display: flex;
              justify-content: space-between;
              align-items: center;
              height: 50px;
            }

            /* Blinking animation for the title bar when collapsed */
            .issues-corner:not(.expanded) .issues-header {
              animation: blink-glow 2s infinite;
            }

            @keyframes blink-glow {
              0%,
              100% {
                background: rgba(255, 255, 255, 0.02);
                box-shadow: inset 0 0 0px transparent;
              }
              50% {
                background: rgba(255, 107, 191, 0.1);
                box-shadow: inset 0 0 15px rgba(255, 107, 191, 0.2);
              }
            }

            .issues-header h3 {
              font-family: var(--font-mono);
              font-size: 0.9rem;
              text-transform: uppercase;
              letter-spacing: 1px;
              color: var(--pink);
            }

            .issue-list {
              max-height: 250px;
              overflow-y: auto;
              padding: 10px 0;
            }

            .issue-item {
              padding: 12px 20px;
              border-bottom: 1px solid rgba(255, 255, 255, 0.03);
              display: block;
              text-decoration: none;
              transition: background 0.2s;
            }

            .issue-item:hover {
              background: rgba(255, 255, 255, 0.03);
            }

            .issue-item:last-child {
              border-bottom: none;
            }

            .issue-title {
              font-size: 0.85rem;
              color: var(--text-primary);
              margin-bottom: 4px;
              white-space: nowrap;
              overflow: hidden;
              text-overflow: ellipsis;
            }

            .issue-meta {
              font-size: 0.7rem;
              color: var(--text-secondary);
              font-family: var(--font-mono);
            }

            .explore-btn {
              padding: 12px;
              text-align: center;
              background: var(--accent);
              color: white;
              text-decoration: none;
              font-size: 0.8rem;
              font-weight: 600;
              text-transform: uppercase;
              letter-spacing: 1px;
              transition: background 0.3s;
            }

            .explore-btn:hover {
              background: #9082ff;
            }

            /* Loading Spinner */
            #loader {
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background: var(--bg);
              display: flex;
              justify-content: center;
              align-items: center;
              z-index: 1000;
              transition: opacity 0.5s;
            }

            .spinner {
              width: 40px;
              height: 40px;
              border: 3px solid var(--accent-glow);
              border-top-color: var(--accent);
              border-radius: 50%;
              animation: spin 1s linear infinite;
            }

            @keyframes spin {
              to {
                transform: rotate(360deg);
              }
            }

            @media (max-width: 600px) {
              header h1 {
                font-size: 1.8rem;
              }
              .grid {
                grid-template-columns: 1fr;
              }
              .issues-corner {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
                bottom: 20px;
              }
            }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
    </div>

    <header>
      <div class="profile-container">
        <div class="avatar-glow">
          <img id="user-avatar" src="" alt="Profile" class="avatar" />
        </div>
        <div class="profile-info">
          <h1 id="user-name">Loading...</h1>
          <p
            id="user-bio"
            style="color: var(--text-secondary); font-size: 0.95rem"
          ></p>
          <div class="stats-bar">
            <div class="stat-item">
              <span id="stat-stars" class="stat-value">0</span>
              <span class="stat-label">Total Stars</span>
            </div>
            <div class="stat-item">
              <span id="stat-contributions" class="stat-value">0</span>
              <span class="stat-label">Contributions</span>
            </div>
            <div class="stat-item">
              <span id="stat-repos" class="stat-value">0</span>
              <span class="stat-label">Public Repos</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="search-container">
      <input
        type="text"
        id="search-input"
        placeholder="Search repositories..."
      />
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-category="All">All</button>
      <button class="filter-tab" data-category="Flex">Flex</button>
      <button class="filter-tab" data-category="Tools">Tools</button>
      <button class="filter-tab" data-category="Gallery">Gallery</button>
      <button class="filter-tab" data-category="Open Source">
        Open Source
      </button>
    </div>

    <main class="grid" id="repo-grid">
      <!-- Repos will be injected here -->
    </main>
    <div
      id="no-results"
      class="no-results"
      style="
        display: none;
        grid-column: 1/-1;
        text-align: center;
        color: var(--text-secondary);
        padding: 20px;
      "
    >
      No repositories match your search.
    </div>

    <div class="issues-corner" id="issues-panel">
      <div class="issues-header">
        <h3>Active Issues</h3>
        <span
          id="issue-count"
          style="
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-secondary);
          "
        ></span>
      </div>
      <div class="issue-list" id="issue-container">
        <!-- Issues will be injected here -->
      </div>
      <a id="explore-github" href="#" target="_blank" class="explore-btn"
        >Explore More ↗</a
      >
    </div>

    <script>
      // CONFIGURATION: Add your repo names here
      const GITHUB_USERNAME = "Rohan-Shridhar";

      // Repository categories mapping
      const CATEGORIES = {
        Flex: ["portfolio", "gridcraft", "javascript"],
        Gallery: [
          "rohan-shridhar",
          "page-construction",
          "java-practice-lab",
          "NotJS",
          "HTML",
          "earth",
          "Progress-tracker",
          "to-do-list",
          "Prisoners-Delima",
          "First-repo",
          "digital-clock",
        ],
        Tools: [
          "envguard",
          "ciphex",
          "Attendance-Tracker-App",
          "Attendance-Tracker",
        ],
        "Open Source": ["qr-code-snipper", "BallotIQ", "ytm-miniplayer", "sponsorbase", "CareSync", "Prism-Bits"],
      };

      async function init() {
        try {
          // Set avatar immediately using direct link (no API needed)
          document.getElementById("user-avatar").src =
            `https://github.com/${GITHUB_USERNAME}.png`;

          // Parallel fetch of basic profile and contribution data
          const [profileRes, contribRes] = await Promise.allSettled([
            fetch(`https://api.github.com/users/${GITHUB_USERNAME}`),
            fetch(
              `https://github-contributions-api.jogruber.de/v4/${GITHUB_USERNAME}?last=1`,
            ),
          ]);

          // Handle Profile
          if (profileRes.status === "fulfilled" && profileRes.value.ok) {
            const profile = await profileRes.value.json();
            updateProfile(profile);
          } else {
            console.error("Profile fetch failed (likely rate limited)");
            document.getElementById("user-name").innerText = GITHUB_USERNAME;
          }

          // Handle Contributions
          if (contribRes.status === "fulfilled" && contribRes.value.ok) {
            try {
              const data = await contribRes.value.json();
              const total = Object.values(data.total).reduce(
                (a, b) => a + b,
                0,
              );
              document.getElementById("stat-contributions").innerText =
                total.toLocaleString();
            } catch (e) {
              console.error("Could not parse contributions", e);
            }
          }

          // Optimization: Fetch all repos once to get BOTH the gallery data and the star count
          // This saves N individual repo calls!
          const allReposRes = await fetch(
            `https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`,
          );
          if (allReposRes.ok) {
            const allRepos = await allReposRes.json();
            if (Array.isArray(allRepos)) {
              renderReposOptimized(allRepos);
            }
          } else if (allReposRes.status === 403) {
            throw new Error("Rate limit exceeded");
          }

          // Fetch issues
          await renderIssues();
        } catch (error) {
          console.error("Init missed:", error);
          if (error.message.includes("Rate limit")) {
            const grid = document.getElementById("repo-grid");
            grid.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--text-secondary);">
                        <p>GitHub API Rate Limit Reached 🚦</p>
                        <p style="font-size: 0.8rem; margin-top: 10px;">The gallery will return automatically once the limit resets (usually within an hour).</p>
                    </div>`;
          }
        } finally {
          // Ensure loader always hides
          document.getElementById("loader").style.opacity = "0";
          setTimeout(() => {
            document.getElementById("loader").style.display = "none";
          }, 500);
        }
      }

      function updateProfile(data) {
        document.getElementById("user-name").innerText =
          data.name || data.login;
        document.getElementById("user-bio").innerText =
          data.bio || `Passionate developer building things with code.`;
        document.getElementById("stat-repos").innerText =
          data.public_repos || 0;
        document.getElementById("explore-github").href =
          `https://github.com/search?q=owner%3A${GITHUB_USERNAME}+++&type=issues&state=open`;
      }

      // Helper: return category for a given repository name
      function getCategoryForRepo(repoName) {
        for (const [category, names] of Object.entries(CATEGORIES)) {
          if (
            names.map((n) => n.toLowerCase()).includes(repoName.toLowerCase())
          ) {
            return category;
          }
        }
        return "Uncategorized";
      }

      // Helper: map category to badge color variable
      function getCategoryColor(category) {
        switch (category) {
          case "Flex":
            return "var(--accent)";
          case "Tools":
            return "var(--teal)";
          case "Open Source":
            return "var(--pink)";
          case "Gallery":
          case "Uncategorized":
          default:
            return "var(--text-secondary)";
        }
      }

      function renderReposOptimized(allRepos) {
        const grid = document.getElementById("repo-grid");

        // Calculate total stars from all repos
        const totalStars = allRepos.reduce(
          (acc, repo) => acc + (repo.stargazers_count || 0),
          0,
        );
        document.getElementById("stat-stars").innerText = totalStars;

        if (!Array.isArray(allRepos) || allRepos.length === 0) {
          grid.innerHTML = `<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--text-secondary);">No repositories available to display.</div>`;
          return;
        }

        allRepos.forEach((repo, index) => {
          const category = getCategoryForRepo(repo.name);
          const badgeColor = getCategoryColor(category);
          const card = document.createElement("a");
          card.className = "repo-card";
          card.href = repo.html_url;
          card.target = "_blank";
          card.style.transitionDelay = `${index * 100}ms`;
          card.setAttribute("data-category", category);

          // Updated card HTML with fork count and timestamp
          const cardHTML = `
      <div class="card-header">
        <span class="repo-name">${repo.name}</span>
        <span class="category-badge" style="background:${badgeColor}; border-color:${badgeColor};">${category}</span>
        <div class="star-count">
          <i class="fa-solid fa-star"></i>
          ${repo.stargazers_count}
        </div>
        <div class="fork-count">
          <i class="fa-solid fa-code-fork"></i>
          ${repo.forks_count}
        </div>
      </div>
      <p class="repo-desc">${repo.description || "No description provided."}</p>
      <div class="topics">
        ${
          repo.topics
            ? repo.topics
                .slice(0, 3)
                .map((t) => `<span class="topic">${t}</span>`)
                .join("")
            : ""
        }
      </div>
      <div class="card-footer">
        <div class="language">
          <span class="lang-dot" style="background: ${getLangColor(repo.language)}"></span>
          ${repo.language || "Plain Text"}
        </div>
        <span class="last-updated">${timeAgo(repo.updated_at)}</span>
      </div>
    `;
          card.innerHTML = cardHTML;
          grid.appendChild(card);
          setTimeout(() => card.classList.add("loaded"), 50);
        });
        setupFilters();
      }

      function setupFilters() {
        const tabs = document.querySelectorAll(".filter-tab");
        const searchInput = document.getElementById("search-input");
        const noResultsDiv = document.getElementById("no-results");
        let activeCategory = "All";

        const applyFilters = () => {
          const query = searchInput.value.trim().toLowerCase();
          const cards = document.querySelectorAll(".repo-card");
          let anyVisible = false;
          cards.forEach((card) => {
            const matchesCategory =
              activeCategory === "All" ||
              card.dataset.category === activeCategory;
            const name =
              card.querySelector(".repo-name")?.textContent.toLowerCase() || "";
            const desc =
              card.querySelector(".repo-desc")?.textContent.toLowerCase() || "";
            const matchesSearch =
              !query || name.includes(query) || desc.includes(query);
            if (matchesCategory && matchesSearch) {
              card.style.display = "";
              requestAnimationFrame(() => card.classList.add("loaded"));
              anyVisible = true;
            } else {
              card.classList.remove("loaded");
              card.style.display = "none";
            }
          });
          noResultsDiv.style.display = anyVisible ? "none" : "block";
        };

        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelector(".filter-tab.active")
              ?.classList.remove("active");
            tab.classList.add("active");
            activeCategory = tab.dataset.category;
            applyFilters();
          });
        });

        searchInput.addEventListener("input", applyFilters);
        applyFilters();
      }

      async function renderIssues() {
        const container = document.getElementById("issue-container");
        try {
          const res = await fetch(
            `https://api.github.com/search/issues?q=user:${GITHUB_USERNAME}+is:open+is:issue`,
          );
          if (!res.ok) throw new Error("Issues fetch failed");

          const data = await res.json();
          document.getElementById("issue-count").innerText =
            `${data.total_count || 0} Open`;

          if (
            !data.items ||
            !Array.isArray(data.items) ||
            data.items.length === 0
          ) {
            container.innerHTML = `<div style="padding: 20px; font-size: 0.8rem; color: var(--text-secondary); text-align: center;">No active issues found. All systems go! 🚀</div>`;
            return;
          }

          data.items.slice(0, 5).forEach((issue) => {
            const item = document.createElement("a");
            item.className = "issue-item";
            item.href = issue.html_url;
            item.target = "_blank";

            const repoName = issue.repository_url.split("/").pop();

            item.innerHTML = `
                        <div class="issue-title">${issue.title}</div>
                        <div class="issue-meta">${repoName} #${issue.number}</div>
                    `;
            container.appendChild(item);
          });
        } catch (e) {
          console.error("Could not fetch issues", e);
          container.innerHTML = `<div style="padding: 20px; font-size: 0.8rem; color: var(--text-secondary); text-align: center;">Issues temporarily unavailable (Rate limited).</div>`;
        }
      }

      function getLangColor(lang) {
        const colors = {
          JavaScript: "#f1e05a",
          TypeScript: "#3178c6",
          HTML: "#e34c26",
          CSS: "#563d7c",
          Python: "#3572A5",
          Java: "#b07219",
          "C++": "#f34b7d",
          PHP: "#4F5D95",
          Go: "#00ADD8",
        };
        return colors[lang] || "#888";
      }

      // Helper: convert ISO date string to relative time like "today", "X days ago", "X months ago"
      function timeAgo(dateString) {
        const now = new Date();
        const then = new Date(dateString);
        const diffMs = now - then;
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        if (diffDays < 1) return "today";
        if (diffDays < 30) return `${diffDays} days ago`;
        const diffMonths = Math.floor(diffDays / 30);
        return `${diffMonths} months ago`;
      }

      // Toggle issues panel
      document.querySelector(".issues-header").addEventListener("click", () => {
        document.getElementById("issues-panel").classList.toggle("expanded");
      });

      init();
    </script>
  </body>
</html>
